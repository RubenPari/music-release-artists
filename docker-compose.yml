services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: music_release_artists
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d music_release_artists"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    ports:
      - "3333:3333"
    volumes:
      - ./backend:/app/backend
      - backend_node_modules:/app/backend/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3333
      - HOST=0.0.0.0
      - APP_URL=${APP_URL:-http://127.0.0.1:5173}
      - DB_CONNECTION=pg
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=app
      - DB_PASSWORD=app
      - DB_DATABASE=music_release_artists
    working_dir: /app/backend
    command: sh -c "npm ci && node ace migration:run --force && node ace serve --hmr"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3333/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 600s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://backend:3333
    ports:
      - "5173:5173"
    environment:
      - BACKEND_UPSTREAM=backend:3333
    networks:
      - app-network
    depends_on:
      backend:
        condition: service_healthy

  scheduler:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
      - DB_CONNECTION=pg
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=app
      - DB_PASSWORD=app
      - DB_DATABASE=music_release_artists
    working_dir: /app/build
    entrypoint: /bin/sh
    command:
      - -c
      - |
        echo "0 8 * * * cd /app/build && node ace send:release_digest >> /proc/1/fd/1 2>&1" > /etc/crontabs/root
        crond -f -l 2
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  postgres_data:
  backend_node_modules:
